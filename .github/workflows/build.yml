name: Build QMOD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  MOD_ID: my-cool-mod
  MOD_VERSION: 0.1.0
  NDK_VERSION: r25c

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Install QPM manually instead of using the broken action ──
      - name: Install QPM Rust (manual)
        run: |
          # Download latest QPM CLI release directly
          wget -q https://github.com/QuestPackageManager/QPM.CLI/releases/latest/download/qpm-linux -O qpm
          chmod +x qpm
          sudo mv qpm /usr/local/bin/qpm
          qpm --version

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Setup CMake & Ninja
        uses: lukka/get-cmake@latest

      - name: QPM Restore
        run: qpm restore

      - name: Build mod
        run: |
          cd ${GITHUB_WORKSPACE}
          qpm s build
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Generate mod.json from template
        run: |
          sed "s/\${version}/${{ env.MOD_VERSION }}/g" \
            mod.template.json > mod.json

      - name: Package QMOD
        run: |
          mkdir -p qmod_staging
          cp ./build/lib${MOD_ID}.so qmod_staging/
          cp mod.json qmod_staging/
          [ -f "cover.png" ] && cp cover.png qmod_staging/
          cd qmod_staging
          zip -r ../${{ env.MOD_ID }}_v${{ env.MOD_VERSION }}.qmod *

      - name: Upload QMOD artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MOD_ID }}-qmod
          path: ${{ env.MOD_ID }}_v${{ env.MOD_VERSION }}.qmod

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download QMOD artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.MOD_ID }}-qmod

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.qmod"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
